<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Algorid — Page Not Found</title>
    <script>
      // GitHub Pages SPA redirect trick:
      // Encode the current path as a query param and redirect to index.html
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host + '/?/' +
        l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
